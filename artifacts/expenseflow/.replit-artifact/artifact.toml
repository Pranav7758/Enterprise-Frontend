kind = "web"
previewPath = "/"
title = "ExpenseFlow — Multi-Org Expense Management"
version = "1.0.0"
id = "artifacts/expenseflow"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20563

[services.development]
run = "pnpm --filter @workspace/expenseflow run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/expenseflow", "run", "build" ]
publicDir = "artifacts/expenseflow/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20563"
BASE_PATH = "/"
